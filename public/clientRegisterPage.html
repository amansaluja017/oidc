<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #ffffff;
            --fg: #09090b;
            --muted: #71717a;
            --muted-bg: #f4f4f5;
            --border: #e4e4e7;
            --input-bg: #ffffff;
            --ring: #18181b;
            --card-bg: #ffffff;
            --card-shadow: 0 1px 3px 0 rgb(0 0 0 / .1), 0 1px 2px -1px rgb(0 0 0 / .1);
            --radius: 0.5rem;
            --btn-bg: #18181b;
            --btn-fg: #fafafa;
            --btn-hover: #27272a;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #09090b;
                --fg: #fafafa;
                --muted: #a1a1aa;
                --muted-bg: #27272a;
                --border: #27272a;
                --input-bg: #09090b;
                --ring: #d4d4d8;
                --card-bg: #18181b;
                --card-shadow: 0 1px 3px 0 rgb(0 0 0 / .4), 0 1px 2px -1px rgb(0 0 0 / .4);
                --btn-bg: #fafafa;
                --btn-fg: #18181b;
                --btn-hover: #e4e4e7;
            }
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--fg);
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            width: 100%;
            max-width: 360px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: calc(var(--radius) + 4px);
            box-shadow: var(--card-shadow);
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 1.75rem;
        }

        .icon {
            width: 40px;
            height: 40px;
            background: var(--fg);
            border-radius: var(--radius);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .icon svg {
            color: var(--bg);
        }

        h1 {
            font-size: 1.375rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.3;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--muted);
            margin-top: 0.35rem;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--fg);
        }

        input {
            width: 100%;
            height: 2.375rem;
            padding: 0 0.75rem;
            font-family: inherit;
            font-size: 0.875rem;
            color: var(--fg);
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input::placeholder {
            color: var(--muted);
        }

        input:focus {
            border-color: var(--ring);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 20%, transparent);
        }

        .field-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .forgot {
            font-size: 0.8125rem;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.15s;
        }

        .forgot:hover {
            color: var(--fg);
        }

        button[type="submit"] {
            width: 100%;
            height: 2.375rem;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--btn-fg);
            background: var(--btn-bg);
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            margin-top: 0.25rem;
            transition: background 0.15s, opacity 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button[type="submit"]:hover {
            background: var(--btn-hover);
        }

        button[type="submit"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .spinner {
            display: none;
            width: 14px;
            height: 14px;
            border: 2px solid color-mix(in srgb, var(--btn-fg) 30%, transparent);
            border-top-color: var(--btn-fg);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-msg {
            display: none;
            font-size: 0.8125rem;
            color: #ef4444;
            background: color-mix(in srgb, #ef4444 10%, transparent);
            border: 1px solid color-mix(in srgb, #ef4444 25%, transparent);
            border-radius: var(--radius);
            padding: 0.625rem 0.75rem;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 0.25rem 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            font-size: 0.75rem;
            color: var(--muted);
            white-space: nowrap;
        }

        .footer {
            text-align: center;
            font-size: 0.8125rem;
            color: var(--muted);
            margin-top: 1.25rem;
        }

        .footer a {
            color: var(--fg);
            font-weight: 500;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .credentials-section {
            display: none;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            width: 48px;
            height: 48px;
            background: #10b981;
            border-radius: var(--radius);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .success-icon svg {
            color: white;
        }

        .credential-item {
            background: var(--muted-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .credential-label {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .credential-input-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .credential-input {
            flex: 1;
            padding: 0.75rem;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.875rem;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--fg);
            outline: none;
            word-break: break-all;
        }

        .credential-input:focus {
            border-color: var(--ring);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 20%, transparent);
        }

        .btn-icon {
            width: 2.375rem;
            height: 2.375rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--muted-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            color: var(--muted);
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .btn-icon:hover {
            background: var(--border);
            color: var(--fg);
        }

        .btn-icon:active {
            transform: scale(0.95);
        }

        .copy-feedback {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            font-size: 0.875rem;
            animation: slideUp 2s ease-out forwards;
            z-index: 1000;
        }

        @keyframes slideUp {
            0% {
                transform: translateY(100px);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(0);
                opacity: 0;
            }
        }

        .warning-box {
            background: color-mix(in srgb, #f59e0b 10%, transparent);
            border: 1px solid color-mix(in srgb, #f59e0b 25%, transparent);
            border-radius: var(--radius);
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            color: #b45309;
        }

        @media (prefers-color-scheme: dark) {
            .warning-box {
                color: #fcd34d;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <!-- Registration Form Section -->
        <div id="formSection">
            <div class="header">
                <div class="icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2z" />
                        <path d="M20 21a8 8 0 1 0-16 0" />
                    </svg>
                </div>
                <h1>Welcome to console</h1>
                <p class="subtitle">Create an account to get started</p>
            </div>

            <form class="form" id="signupForm" novalidate>
                <div id="errorMsg" class="error-msg" role="alert"></div>

                <div class="field">
                    <label for="websiteName">Website name</label>
                    <input id="websiteName" name="websiteName" type="text" autocomplete="given-name" placeholder="my website"
                        required />
                </div>

                <div class="field">
                    <label for="domain">Domain</label>
                    <input id="domain" name="domain" type="text" autocomplete="family-name" placeholder="https://mywebsite.com"
                        required />
                </div>

                <div class="field">
                    <label for="redirectUrl">Redirect URL</label>
                    <input id="redirectUrl" name="redirectUrl" type="email" autocomplete="email" placeholder="you@example.com"
                        required />
                </div>

                <button type="submit" id="submitBtn">
                    <span class="spinner" id="spinner"></span>
                    <span id="btnText">Register</span>
                </button>
            </form>

            <div class="footer">
                Don't have an account? <a href="/loginPage.html">Sign in</a>
            </div>
        </div>

        <!-- Credentials Display Section -->
        <div id="credentialsSection" class="credentials-section">
            <div class="header">
                <div class="success-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                <h1>Registration successful!</h1>
                <p class="subtitle">Your OAuth 2.0 credentials are ready</p>
            </div>

            <div class="warning-box">
                ⚠️ <strong>Save your credentials securely.</strong> The client secret will not be shown again. Keep it safe and never share it.
            </div>

            <div class="credential-item">
                <div class="credential-label">Client ID</div>
                <div class="credential-input-group">
                    <input type="text" class="credential-input" id="clientIdInput" readonly />
                    <button type="button" class="btn-icon" id="copyClientIdBtn" title="Copy Client ID">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="credential-item">
                <div class="credential-label">Client Secret</div>
                <div class="credential-input-group">
                    <input type="password" class="credential-input" id="clientSecretInput" readonly />
                    <button type="button" class="btn-icon" id="toggleSecretBtn" title="Show/Hide Client Secret">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                    <button type="button" class="btn-icon" id="copySecretBtn" title="Copy Client Secret">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                        </svg>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const form = document.getElementById('signupForm');
        const submitBtn = document.getElementById('submitBtn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');
        const errorMsg = document.getElementById('errorMsg');
        const formSection = document.getElementById('formSection');
        const credentialsSection = document.getElementById('credentialsSection');
        const clientIdInput = document.getElementById('clientIdInput');
        const clientSecretInput = document.getElementById('clientSecretInput');
        const copyClientIdBtn = document.getElementById('copyClientIdBtn');
        const copySecretBtn = document.getElementById('copySecretBtn');
        const toggleSecretBtn = document.getElementById('toggleSecretBtn');

        const params = new URLSearchParams(window.location.search);

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }

        function hideError() {
            errorMsg.style.display = 'none';
        }

        function setLoading(loading) {
            submitBtn.disabled = loading;
            spinner.style.display = loading ? 'block' : 'none';
            btnText.textContent = loading ? 'Registering…' : 'Register';
        }

        function showCopyFeedback(text = 'Copied to clipboard!') {
            const feedback = document.createElement('div');
            feedback.className = 'copy-feedback';
            feedback.textContent = text;
            document.body.appendChild(feedback);
            setTimeout(() => feedback.remove(), 2000);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showCopyFeedback('Copied to clipboard!');
            }).catch(() => {
                showCopyFeedback('Failed to copy');
            });
        }

        function showCredentials(clientId, clientSecret) {
            formSection.style.display = 'none';
            credentialsSection.style.display = 'block';
            clientIdInput.value = clientId;
            clientSecretInput.value = clientSecret;
        }

        copyClientIdBtn.addEventListener('click', (e) => {
            e.preventDefault();
            copyToClipboard(clientIdInput.value);
        });

        copySecretBtn.addEventListener('click', (e) => {
            e.preventDefault();
            copyToClipboard(clientSecretInput.value);
        });

        toggleSecretBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const isPassword = clientSecretInput.type === 'password';
            clientSecretInput.type = isPassword ? 'text' : 'password';
            
            // Update icon
            const svg = toggleSecretBtn.querySelector('svg');
            if (isPassword) {
                // Change to eye-off icon
                svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                // Change back to eye icon
                svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            
            const websiteName = document.getElementById('websiteName').value.trim();
            const domain = document.getElementById('domain').value.trim();
            const redirectUrl = document.getElementById('redirectUrl').value.trim();

            if (!websiteName || !domain || !redirectUrl) {
                showError('Please fill in all fields.');
                return;
            }

            setLoading(true);

            try {
                const res = await fetch(`/create-client`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: websiteName,
                        domain,
                        redirectUrl
                    }),
                });

                const data = await res.json().catch(() => ({}));

                if (!res.ok) {
                    showError(data.message || 'Something went wrong. Please try again.');
                } else if (data && data.data.clientId && data.data.clientSecret) {
                    showCredentials(data.data.clientId, data.data.clientSecret);
                } else {
                    showError('Unexpected response format. Please try again.');
                }
            } catch (err) {
                showError('Something went wrong. Please try again');
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>

</html>
